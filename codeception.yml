# Global codeception file. KeyForge domain logic lives in common/, so only the
# common suites are wired now. The backend test suite is re-enabled in Phase 7
# (admin/UI) when it gets real tests — YAGNI until then.
include:
    - common
paths:
    output: console/runtime/output
settings:
    colors: true
    memory_limit: 1024M
extensions:
    enabled:
        - Codeception\Extension\RunFailed
