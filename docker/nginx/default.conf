# Serves the KeyForge admin (Yii2 advanced backend) on :80 -> host :8080.
server {
    listen 80;
    server_name localhost;
    root /var/www/keyforge/backend/web;
    index index.php;

    client_max_body_size 32M;   # allow CSV/JSON keyword uploads

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass keyforge-app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Block dotfiles and internal paths.
    location ~ /\.    { deny all; }
    location ~ ^/(runtime|vendor|console|common)/ { deny all; }
}

